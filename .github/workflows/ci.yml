name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Lint manifest
        run: npx vici lint

      - name: Build
        run: npm run build
